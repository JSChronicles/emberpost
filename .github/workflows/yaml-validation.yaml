name: Validate YAML Schema

on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main

  workflow_dispatch:

jobs:
  validate-yaml:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: python:3.14-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-groups

      - name: Validate schedule YAML files against JSON Schema
        run: uv run check-jsonschema --schemafile schemas/schedule.schema.json schedules/*.yaml examples/*.yaml
