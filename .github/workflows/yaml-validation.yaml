name: Validate YAML Schema

on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main

  workflow_dispatch:

jobs:
  validate-yaml:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: python:3.14-slim
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-groups

      - name: Validate schedule YAML files against JSON Schema
        run: uv run check-jsonschema --schemafile schemas/schedule.schema.json schedules/*.yaml examples/*.yaml
