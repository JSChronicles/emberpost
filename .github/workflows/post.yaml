name: post

on:
  workflow_dispatch:
    inputs:
      frequency:
        type: choice
        required: true
        default: daily
        options:
          - daily
          - weekly
  schedule:
    - cron: "30 9 * * MON-FRI" # weekdays at 09:30
      timezone: "America/Chicago"
    - cron: "30 10 * * MON" # Mondays at 10:30
      timezone: "America/Chicago"

env:
  FREQUENCY: ${{ (endsWith(github.event.schedule, 'MON-FRI') || github.event.inputs.frequency == 'daily') && 'daily' || 'weekly' }}

permissions:
  contents: read

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    container:
      image: python:3.14-slim
    env:
      PYTHONPATH: src
      PAGERDUTY_API_KEY_BUSINESS1_PAGERDUTY_COM: ${{ secrets.PAGERDUTY_API_KEY_BUSINESS1_PAGERDUTY_COM }}
      SLACK_API_KEY_BUSINESS1SPACE_SLACK_COM: ${{ secrets.SLACK_API_KEY_BUSINESS1SPACE_SLACK_COM }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups


      - name: Slack post
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          for schedule_file in schedules/*.yaml; do
            echo "Processing ${schedule_file}"
            uv run emberpost \
              --schedule-file "${schedule_file}" \
              --frequency "${FREQUENCY}"
          done

      - name: Slack post (dry run on non-main)
        if: ${{ github.ref != 'refs/heads/main' }}
        run: uv run emberpost --schedule-file tests/schedules/test-oncall.yaml --frequency weekly --dry-run

