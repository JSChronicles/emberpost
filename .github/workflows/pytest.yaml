name: Python Tests
on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    container:
      image: python:3.14-slim
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install the project
        run: uv sync --all-groups

      - name: Build package
        run: uv build

      - name: Smoke test module entrypoint
        env:
          PYTHONPATH: src
        run: uv run python -m emberpost.post --help

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: uv run pytest
