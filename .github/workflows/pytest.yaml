name: Python Tests

permissions:
  contents: read

on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main

  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    container:
      image: python:3.14-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Smoke test module entrypoint
        env:
          PYTHONPATH: src
        run: uv run python -m emberpost.post --help

      - name: Run tests with coverage
        run: uv run pytest
